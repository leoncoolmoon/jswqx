<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta charset="utf-8" />
    <title>文曲星模拟器 - NC1020</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/BrowserFS/2.0.0/browserfs.min.js"></script>
    <script src="src/m65c02.js"></script>
    <script src="src/wqx.js"></script>
    <script src="src/keyinput.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0f;
            --surface-color: #1c1c1e;
            --primary-color: #0a84ff;
            --text-color: #ffffff;
            --secondary-text: #98989d;
            --accent-color: #ff453a;
            --lcd-bg: #809a4e;
            --device-shadow: 0 40px 100px rgba(0, 0, 0, 0.7), 0 0 20px rgba(0, 0, 0, 0.3);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 30%, #1c1c21 0%, #0d0d0f 100%);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            color: #ffffff;
            margin: 40px 0 24px 0;
            font-weight: 700;
            font-size: 32px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            margin-bottom: 40px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(44, 44, 46, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 8px 16px;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        button {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        button:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #flash_status {
            font-size: 13px;
            color: var(--secondary-text);
            margin-left: 12px;
            padding-left: 12px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 100px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #device-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 40px 0;
            perspective: 2000px;
        }

        #device {
            position: relative;
            width: 434px;
            height: 543px;
            transform-origin: top center;
            border-radius: 30px;
            box-shadow: var(--device-shadow);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* The top layer: physical device frame with hole */
        #key {
            width: 434px;
            height: 543px;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 20;
            cursor: pointer;
            pointer-events: auto;
            image-rendering: high-quality;
        }

        /* The bottom layer: LCD content aligned with physical screen area */
        #outScr {
            position: absolute;
            left: 15px; /* Physical green area x1 */
            top: 14px;  /* Physical green area y1 */
            width: 376px; /* Physical green area width */
            height: 163px; /* Physical green area height */
            z-index: 10;
            background-color: var(--lcd-bg);
            overflow: hidden;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            /* Inner shadow to simulate screen depth */
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.5), inset 0 -1px 3px rgba(255,255,255,0.2);
        }

        #scr {
            width: 320px;
            height: 160px;
            /* Align 320px LCD center with Ruler center (digit 5 at 195.5) */
            /* (195.5 - 160) - 15 = 20.5px */
            margin-left: 20.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* LCD pixel grid texture */
            background-image: linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 2px 2px;
            background-position: 0 0;
        }

        #lcd canvas {
            width: 320px;
            height: 160px;
            image-rendering: pixelated;
            mix-blend-mode: multiply; /* Darkens the green background */
            opacity: 0.85;
            display: block;
        }

        #info {
            max-width: 600px;
            width: 90%;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 60px;
            color: var(--secondary-text);
            padding: 30px;
            background: rgba(28, 28, 30, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #info strong {
            color: var(--text-color);
        }

        #info a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        #info a:hover {
            text-decoration: underline;
        }

        #reset {
            position: relative;
            overflow: hidden;
        }
        #reset::after {
            content: '';
            position: absolute;
            left: 0; bottom: 0;
            height: 3px;
            width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }
        #reset.pressing::after {
            width: 100%;
            transition: width 2s linear;
        }

        @media (max-height: 800px) {
            h1 { font-size: 24px; margin: 20px 0 15px 0; }
            .controls { margin-bottom: 20px; }
            #device-container { padding: 20px 0; }
            #info { margin-top: 30px; padding: 20px; }
        }
    </style>
</head>

<body onselectstart="return false">
    <h1>文曲星模拟器</h1>
    <div class="controls">
        <button id="run" onclick="run();" disabled>Run</button>
        <button id="stop" onclick="stop();" disabled>Stop</button>
        <button id="reset" title="Click: Reset CPU&#10;Hold 2s: Clear save">Reset</button>
        <button id="load_demo">ROM Loaded</button>
        <span id="flash_status">Initializing...</span>
    </div>

    <div id="device-container">
        <div id="device">
            <!-- Screen area behind the frame -->
            <div id="outScr">
                <div id="scr">
                    <div id="lcd"></div>
                </div>
            </div>
            <!-- Physical device frame on top -->
            <canvas id="key" width="434" height="543"></canvas>
        </div>
    </div>

    <div id="info">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <strong>Keyboard Shortcuts</strong>
            <span style="font-size: 12px; opacity: 0.6; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 10px;">NC1020</span>
        </div>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; font-size: 13px;">
            <div>F1-F4: <span style="opacity: 0.8">F1-F4 Function Keys</span></div>
            <div>Enter: <span style="opacity: 0.8">Enter / Confirm</span></div>
            <div>Esc: <span style="opacity: 0.8">Escape / Back</span></div>
            <div>Arrow Keys: <span style="opacity: 0.8">Navigate</span></div>
            <div>Letters: <span style="opacity: 0.8">Alpha Input</span></div>
            <div>Shift/Ctrl: <span style="opacity: 0.8">Modifiers</span></div>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 25px 0;">
        <p style="margin: 0; font-size: 12px; text-align: center; opacity: 0.7;">
            Based on <a href="https://github.com/leoncoolmoon/jswqx" target="_blank">jswqx</a> core.
            Redesigned for high-fidelity alignment and persistent storage.
        </p>
    </div>

    <script>
        // ============================================================
        // NOR Flash localStorage Persistence
        // ============================================================
        var FLASH_STORAGE_KEY = 'wqx_nor_flash';

        function saveFlashToStorage(wqxInstance) {
            try {
                var bytes = wqxInstance.nor;
                var CHUNK = 16384;
                var parts = [];
                for (var i = 0; i < bytes.length; i += CHUNK) {
                    var chunk = bytes.subarray(i, i + CHUNK);
                    var binary = '';
                    for (var j = 0; j < chunk.length; j++) {
                        binary += String.fromCharCode(chunk[j]);
                    }
                    parts.push(btoa(binary));
                }
                localStorage.setItem(FLASH_STORAGE_KEY, JSON.stringify(parts));
                setFlashStatus('💾 Auto-saved');
                return true;
            } catch (e) {
                setFlashStatus('⚠️ Storage full');
                return false;
            }
        }

        function loadFlashFromStorage(wqxInstance) {
            try {
                var stored = localStorage.getItem(FLASH_STORAGE_KEY);
                if (!stored) return false;
                var parts = JSON.parse(stored);
                var offset = 0;
                for (var i = 0; i < parts.length; i++) {
                    var binary = atob(parts[i]);
                    for (var j = 0; j < binary.length; j++) {
                        wqxInstance.nor[offset++] = binary.charCodeAt(j);
                    }
                }
                setFlashStatus('✅ Restored');
                return true;
            } catch (e) {
                return false;
            }
        }

        function clearSavedFlash() {
            localStorage.removeItem(FLASH_STORAGE_KEY);
            setFlashStatus('🗑️ Cleared');
            setTimeout(() => location.reload(), 500);
        }

        (function () {
            var btn = document.getElementById('reset');
            var holdTimer = null;
            var HOLD_MS = 2000;

            function startHold() {
                btn.classList.add('pressing');
                holdTimer = setTimeout(function () {
                    clearSavedFlash();
                }, HOLD_MS);
            }

            function endHold() {
                if (holdTimer !== null) {
                    clearTimeout(holdTimer);
                    holdTimer = null;
                    if (btn.classList.contains('pressing')) reset();
                }
                btn.classList.remove('pressing');
            }

            btn.addEventListener('mousedown', startHold);
            btn.addEventListener('mouseup', endHold);
            btn.addEventListener('mouseleave', endHold);
            btn.addEventListener('touchstart', function(e){ e.preventDefault(); startHold(); });
            btn.addEventListener('touchend', function(e){ e.preventDefault(); endHold(); });
        })();

        function setFlashStatus(msg) {
            var el = document.getElementById('flash_status');
            if (el) el.textContent = msg;
        }

        function injectFlashAutoSave(wqxInstance) {
            var _origLoadNorFlash = wqxInstance.loadNorFlash.bind(wqxInstance);
            wqxInstance.loadNorFlash = function(buffer) {
                _origLoadNorFlash(buffer);
                saveFlashToStorage(wqxInstance);
            };

            var saveTimer = null;
            var _origWriteGE4000 = wqxInstance.writeGE4000.bind(wqxInstance);
            wqxInstance.writeGE4000 = function(addr, value) {
                _origWriteGE4000(addr, value);
                if (saveTimer) clearTimeout(saveTimer);
                saveTimer = setTimeout(function() {
                    saveFlashToStorage(wqxInstance);
                }, 3000);
            };
        }

        // ============================================================
        // Device UI Rendering & Interaction
        // ============================================================
        var canvas = document.getElementById('key');
        var ctx = canvas.getContext('2d');
        var image = new Image();

        image.onload = function () {
            // 1. Draw physical frame
            ctx.drawImage(image, 0, 0);

            // 2. Cut hole for LCD (matching exactly the physical green area)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillRect(15, 14, 376, 163);
            ctx.globalCompositeOperation = 'source-over';

            updateLayout();
        };
        image.src = 'nc1020.png';

        var rulerCenters = [67.0, 99.0, 132.0, 163.5, 195.5, 227.5, 260.0, 292.0, 325.0];
        var indicatorY = 177.5; // Just below the screen hole

        function drawIndicator(index, active) {
            if (!image.complete) return;
            // Draw small triangle indicator above the number
            var x = rulerCenters[index];
            var y = indicatorY;

            if (active) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.beginPath();
                ctx.moveTo(x - 4, y);
                ctx.lineTo(x + 4, y);
                ctx.lineTo(x, y + 5);
                ctx.fill();
            } else {
                // To "erase", we redraw the small patch from the original image
                // Use a slightly larger area to ensure complete erasure
                ctx.drawImage(image, x - 5, y - 1, 10, 8, x - 5, y - 1, 10, 8);
            }
        }

        function updateLayout() {
            var availableWidth = window.innerWidth - 60;
            var availableHeight = window.innerHeight - 180;

            var sWidth = availableWidth / 434;
            var sHeight = availableHeight / 543;
            var s = Math.min(sWidth, sHeight);

            if (s > 1.8) s = 1.8;
            if (s < 0.4) s = 0.4;

            var device = document.getElementById('device');
            device.style.transform = "scale(" + s + ")";

            var scaledHeight = 543 * s;
            var margin = (scaledHeight - 543) / 2;
            device.style.marginTop = (margin + 20) + "px";
            device.style.marginBottom = margin + "px";
        }

        window.addEventListener('resize', updateLayout);

        // Key mapping coordinates
        var keys = [
            { name: 'F1', x: 403, y: 10, width: 28, height: 30 },
            { name: 'F2', x: 403, y: 45, width: 28, height: 30 },
            { name: 'F3', x: 403, y: 80, width: 28, height: 30 },
            { name: 'F4', x: 403, y: 115, width: 28, height: 30 },
            { name: 'F12', x: 400, y: 190, width: 32, height: 32 },
            { name: 'Reset', x: 105, y: 390, width: 10, height: 10 },
            { name: 'F8', x: 131, y: 370, width: 43, height: 35 },
            { name: 'F9', x: 174, y: 370, width: 43, height: 35 },
            { name: 'F10', x: 217, y: 370, width: 43, height: 35 },
            { name: 'F7', x: 260, y: 370, width: 43, height: 35 },
            { name: 'F6', x: 303, y: 370, width: 43, height: 35 },
            { name: 'F5', x: 346, y: 370, width: 43, height: 35 },
            { name: 'F11', x: 389, y: 370, width: 43, height: 35 },
            { name: 'Q', x: 2, y: 407, width: 43, height: 32 },
            { name: 'W', x: 45, y: 407, width: 43, height: 32 },
            { name: 'E', x: 88, y: 407, width: 43, height: 32 },
            { name: 'R', x: 131, y: 407, width: 43, height: 32 },
            { name: 'T', x: 174, y: 407, width: 43, height: 32 },
            { name: 'Y', x: 217, y: 407, width: 43, height: 32 },
            { name: 'U', x: 260, y: 407, width: 43, height: 32 },
            { name: 'I', x: 303, y: 407, width: 43, height: 32 },
            { name: 'O', x: 346, y: 407, width: 43, height: 32 },
            { name: 'P', x: 389, y: 407, width: 43, height: 32 },
            { name: 'A', x: 2, y: 441, width: 43, height: 32 },
            { name: 'S', x: 45, y: 441, width: 43, height: 32 },
            { name: 'D', x: 88, y: 441, width: 43, height: 32 },
            { name: 'F', x: 131, y: 441, width: 43, height: 32 },
            { name: 'G', x: 174, y: 441, width: 43, height: 32 },
            { name: 'H', x: 217, y: 441, width: 43, height: 32 },
            { name: 'J', x: 260, y: 441, width: 43, height: 32 },
            { name: 'K', x: 303, y: 441, width: 43, height: 32 },
            { name: 'L', x: 346, y: 441, width: 43, height: 32 },
            { name: 'Enter', x: 389, y: 441, width: 43, height: 32 },
            { name: 'Z', x: 2, y: 476, width: 43, height: 32 },
            { name: 'X', x: 45, y: 476, width: 43, height: 32 },
            { name: 'C', x: 88, y: 476, width: 43, height: 32 },
            { name: 'V', x: 131, y: 476, width: 43, height: 32 },
            { name: 'B', x: 174, y: 476, width: 43, height: 32 },
            { name: 'N', x: 217, y: 476, width: 43, height: 32 },
            { name: 'M', x: 260, y: 476, width: 43, height: 32 },
            { name: 'PgUp', x: 303, y: 476, width: 43, height: 32 },
            { name: 'Up', x: 346, y: 476, width: 43, height: 32 },
            { name: 'PgDn', x: 389, y: 476, width: 43, height: 32 },
            { name: 'Tab', x: 2, y: 510, width: 43, height: 32 },
            { name: 'Shift', x: 45, y: 510, width: 43, height: 32 },
            { name: 'CapsLock', x: 88, y: 510, width: 43, height: 32 },
            { name: 'Esc', x: 131, y: 510, width: 43, height: 32 },
            { name: '0', x: 174, y: 510, width: 43, height: 32 },
            { name: 'Period', x: 217, y: 510, width: 43, height: 32 },
            { name: 'Equals', x: 260, y: 510, width: 43, height: 32 },
            { name: 'Left', x: 303, y: 510, width: 43, height: 32 },
            { name: 'Down', x: 346, y: 510, width: 43, height: 32 },
            { name: 'Right', x: 389, y: 510, width: 43, height: 32 },
        ];

        function handleMouseEvent(e, isDown) {
            var rect = canvas.getBoundingClientRect();
            var s = rect.width / 434;
            var x = (e.clientX - rect.left) / s;
            var y = (e.clientY - rect.top) / s;
            var key = getKeyAt(x, y);
            keyAction(key, isDown);
        }

        canvas.addEventListener('mousedown', function (e) { handleMouseEvent(e, true); });
        canvas.addEventListener('mouseup', function (e) { handleMouseEvent(e, false); });
        canvas.addEventListener('mouseleave', function (e) { handleMouseEvent(e, false); });
        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var s = rect.width / 434;
            var x = (e.touches[0].clientX - rect.left) / s;
            var y = (e.touches[0].clientY - rect.top) / s;
            var key = getKeyAt(x, y);
            keyAction(key, true);
        }, {passive: false});
        canvas.addEventListener('touchend', function (e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var s = rect.width / 434;
            var x = (e.changedTouches[0].clientX - rect.left) / s;
            var y = (e.changedTouches[0].clientY - rect.top) / s;
            var key = getKeyAt(x, y);
            keyAction(key, false);
        }, {passive: false});

        function getKeyAt(x, y) {
            for (var i = 0; i < keys.length; i++) {
                if (keys[i].x <= x && x <= keys[i].x + keys[i].width &&
                    keys[i].y <= y && y <= keys[i].y + keys[i].height) {
                    return keys[i].name;
                }
            }
            return null;
        }

        function keyAction(name, isDown) {
            if (name != null) {
                if (isDown) {
                    keyInput.keyDown(name);
                } else {
                    if (name === "Reset") reset();
                    else keyInput.keyUp(name);
                }
            }
        }

        // ============================================================
        // Emulator Lifecycle
        // ============================================================
        var wqxDiv = document.getElementById('lcd');
        var wqx = new Wqx(wqxDiv);
        var keyInput = new WqxKeyInput(wqx, document.body);

        // Hook LCD segments (indicators)
        // NC1020 ruler indicators are bit 7 of the first byte (col 0) of rows 64-72
        var _origUpdateLCD = wqx.updateLCD.bind(wqx);
        wqx.updateLCD = function(addr, value) {
            var offset = addr - this.lcdbuffaddr;
            var row = Math.floor(offset / 20);
            var col = offset % 20;

            if (col === 0) {
                var active = (value & 0x80) !== 0;
                if (row >= 64 && row <= 72) {
                    drawIndicator(row - 64, active);
                }
                // Other indicators (top icons etc.) could be added here
            }

            _origUpdateLCD(addr, value);
        };

        injectFlashAutoSave(wqx);

        var romLoaded = false;
        var norLoaded = false;

        function check() {
            if (romLoaded && norLoaded) run();
        }

        function loadZip() {
            var xhrZip = new XMLHttpRequest();
            xhrZip.open('GET', 'rom.zip', true);
            xhrZip.responseType = 'arraybuffer';
            xhrZip.addEventListener('loadend', function () {
                mountBFS(xhrZip.response);
            }, false);
            xhrZip.send();
        }

        function mountBFS(zipData) {
            var Buffer = BrowserFS.BFSRequire('buffer').Buffer;
            BrowserFS.configure({
                fs: "ZipFS",
                options: { zipData: Buffer.from(zipData) }
            }, function (e) {
                if (e) throw e;
                var fs = BrowserFS.BFSRequire('fs');
                fs.readFile('/obj_lu.bin', function (err, data) {
                    wqx.loadBROM(data);
                    romLoaded = true;
                    if (loadFlashFromStorage(wqx)) {
                        norLoaded = true;
                        check();
                    } else {
                        fs.readFile('/nc1020.fls', function (err, data) {
                            wqx.loadNorFlash(data);
                            norLoaded = true;
                            check();
                        });
                    }
                });
            });
        }

        function run() {
            wqx.run();
            document.getElementById('run').disabled = true;
            document.getElementById('stop').disabled = false;
        }
        function stop() {
            wqx.stop();
            document.getElementById('stop').disabled = true;
            document.getElementById('run').disabled = false;
        }
        function reset() {
            wqx.reset();
        }

        try { loadZip(); } catch (e) { }
    </script>
</body>

</html>
